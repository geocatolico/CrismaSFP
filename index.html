<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="LOGO/Logo-CrismaSímbolo-8.ico">
    <title>Encontros de Crisma</title>
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1a1f36 0%, #0d111f 100%);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .page {
            width: 100%;
            max-width: 900px;
            text-align: center;
            border-radius: 24px;
            background: rgba(16, 20, 34, 0.95);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.4rem;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: #111625;
            border-radius: 18px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 202, 40, 0.4);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 1.4rem;
            color: #ffca28;
        }

        .card p {
            color: #d1d5db;
            font-size: 0.98rem;
            line-height: 1.6;
        }

        .card a {
            display: inline-block;
            margin-top: 22px;
            padding: 12px 20px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            color: #0f172a;
            background: #ffca28;
            transition: background 0.25s ease;
        }

        .card a:hover {
            background: #fddb6e;
        }
                /* --- Footer --- */
        footer {
            background-color: #0a0b11;
            text-align: center;
            padding: 40px 5%;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--texto-mutado);
            font-size: 0.9rem;
        }

        footer p span {
            color: var(--detalhe-neon);
            font-weight: 600;
        }

    </style>
    
</head>

<body>
    <main class="page">
        <h1>MATERIAL DE ENCONTRO</h1>
        <p>Escolha o tema De encontro que deseja acessar.</p>
        <div class="grid">
            <article class="card">
                <h2>A IGREJA</h2>
                <p>ECONTRO 07/06/2026.</p>
                <a href="A igreja.html">Abrir</a>
            </article>
            <article class="card">
                <h2>SAGRADAS ESCRITURAS</h2>
                <p>ECONTRO 28/06/2026.</p>
                <a href="escrituras.html">Abrir</a>
            </article>
        </div>
    
    </main>
</body>
</html>
